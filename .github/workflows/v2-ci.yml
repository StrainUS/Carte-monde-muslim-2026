name: v2 · lint + tests + build

on:
  push:
    branches: [main, v2-rewrite]
  pull_request:
    branches: [main, v2-rewrite]
  workflow_dispatch:

concurrency:
  group: v2-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Import legacy data (deterministic)
        run: npm run import:legacy

      - name: Build world GeoJSON
        run: node tools/build-geojson.mjs

      - name: TypeScript / Svelte check
        run: npm run check

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Unit tests (Vitest)
        run: npm test

      - name: Production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: v2-build
          path: app/build

  e2e:
    needs: verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npm run import:legacy
      - run: node tools/build-geojson.mjs
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Playwright tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: app/playwright-report
          retention-days: 7
