<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <title>Guide — redirection</title>
  <link rel="canonical" href="index.html#guide-hub">
  <script>
    (function () {
      try {
        var t = location.hash;
        if (!t || t === "#") t = "#guide-hub";
        location.replace("index.html" + t);
      } catch (e) {
        location.href = "index.html#guide-hub";
      }
    })();
  </script>
</head>
<body>
  <p>Le guide et le diaporama sont intégrés à l’application. <a href="index.html#guide-hub">Ouvrir l’interface unique</a>.</p>

</body>
</html>
