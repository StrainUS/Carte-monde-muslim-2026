<!doctype html>
<html lang="fr" data-theme="dark" %sveltekit.theme%>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="Islam mondial 2026 — carte interactive, contexte géopolitique, chronologie terrorisme France, quiz d'auto-évaluation, guide de veille pour agents de sécurité. Sources officielles (Pew, Europol, SGDSN, Intérieur)."
    />
    <meta name="theme-color" content="#0e1117" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta property="og:title" content="Islam mondial 2026 — Carte, veille & prévention" />
    <meta
      property="og:description"
      content="Outil pédagogique de veille géopolitique et de prévention pour agents de sécurité. Synthèses indicatives, sources officielles."
    />
    <meta property="og:type" content="website" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
