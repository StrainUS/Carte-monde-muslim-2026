  <title id="t4">Chiisme : branches</title>
  <rect width="520" height="210" fill="#0d1628" rx="12"/>
  <text x="260" y="28" fill="#c9a84c" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Chiisme (rappel sch&#233;matique)</text>
  <text x="260" y="56" fill="#e4eaf4" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Pluralit&#233; autour de la succession et de l&#039;autorit&#233; religieuse</text>
  <line x1="260" y1="68" x2="260" y2="95" stroke="#4d9ef5" stroke-width="2"/>
  <rect x="60" y="98" width="120" height="56" fill="rgba(77,158,245,0.12)" stroke="#4d9ef5" rx="6"/>
