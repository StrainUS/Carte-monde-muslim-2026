<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" role="img" aria-labelledby="t5">
  <title id="t5">Sunnite, ibadi, chiite</title>
  <rect width="520" height="200" fill="#0d1628" rx="12"/>
  <text x="260" y="30" fill="#c9a84c" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Au-del&#224; du duo sunnite / chiite</text>
  <text x="260" y="52" fill="#e4eaf4" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Musulmans (sch&#233;ma tr&#232;s simplifi&#233;)</text>
  <rect x="40" y="92" width="130" height="72" fill="rgba(94,201,114,0.12)" stroke="#5ec972" rx="8"/>
  <text x="105" y="122" fill="#e4eaf4" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">Sunnisme</text>
  <text x="105" y="142" fill="#6b7a9a" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">majorit&#233;</text>
  <text x="105" y="156" fill="#6b7a9a" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">d&#233;mographique</text>
  <rect x="195" y="92" width="130" height="72" fill="rgba(206,147,216,0.15)" stroke="#ce93d8" rx="8"/>
  <text x="260" y="122" fill="#e4eaf4" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">Ibadisme</text>
  <text x="260" y="142" fill="#6b7a9a" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Oman,</text>
  <text x="260" y="156" fill="#6b7a9a" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">branche distincte</text>
  <rect x="350" y="92" width="130" height="72" fill="rgba(77,158,245,0.12)" stroke="#4d9ef5" rx="8"/>
  <text x="415" y="122" fill="#e4eaf4" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">Chiisme</text>
  <text x="415" y="142" fill="#6b7a9a" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">minorit&#233;</text>
  <text x="415" y="156" fill="#6b7a9a" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">globale estim&#233;e</text>
  <text x="260" y="188" fill="#6b7a9a" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Alaouites, al&#233;vis : souvent mal ventil&#233;s dans les agr&#233;gats</text>
</svg>
