<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" role="img" aria-labelledby="t1">
  <title id="t1">Schema : diversite geographique, juridique et spirituelle des musulmans</title>
  <rect width="520" height="200" fill="#0d1628" rx="12"/>
  <text x="260" y="28" fill="#c9a84c" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Trois dimensions &#224; distinguer</text>
  <circle cx="100" cy="110" r="44" fill="none" stroke="#5ec972" stroke-width="2"/>
  <text x="100" y="108" fill="#e4eaf4" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">G&#233;ographie</text>
  <text x="100" y="124" fill="#6b7a9a" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">o&#249; l&#039;on vit</text>
  <circle cx="260" cy="110" r="44" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <text x="260" y="108" fill="#e4eaf4" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Juridique</text>
  <text x="260" y="124" fill="#6b7a9a" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">&#233;coles, droit</text>
  <circle cx="420" cy="110" r="44" fill="none" stroke="#4d9ef5" stroke-width="2"/>
  <text x="420" y="108" fill="#e4eaf4" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Spirituel</text>
  <text x="420" y="124" fill="#6b7a9a" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">courants, rites</text>
  <text x="260" y="182" fill="#6b7a9a" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">La carte = surtout d&#233;mographie et r&#233;partition estim&#233;e</text>
</svg>
