<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" role="img" aria-labelledby="t8">
  <title id="t8">Pyramide des sources</title>
  <rect width="520" height="200" fill="#0d1628" rx="12"/>
  <text x="260" y="28" fill="#c9a84c" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Hierarchie methodologique recommandee</text>
  <polygon points="260,48 400,175 120,175" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="260" y="78" fill="#e4eaf4" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Sources primaires</text>
  <text x="260" y="94" fill="#6b7a9a" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Pew, ONU WPP, CIA Factbook</text>
