<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" role="img" aria-labelledby="t2">
  <title id="t2">Legende : teintes et echelle de tensions</title>
  <rect width="520" height="220" fill="#0d1628" rx="12"/>
  <text x="260" y="28" fill="#c9a84c" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Lecture des couches (sch&#233;ma)</text>
  <rect x="40" y="52" width="120" height="28" fill="#145c22" rx="4"/>
  <text x="100" y="71" fill="#fff" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Sunnite (fort)</text>
  <rect x="200" y="52" width="120" height="28" fill="#0b3d8a" rx="4"/>
  <text x="260" y="71" fill="#fff" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Chiite (fort)</text>
  <rect x="360" y="52" width="120" height="28" fill="#6a1b9a" rx="4"/>
  <text x="420" y="71" fill="#fff" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Ibadi</text>
  <text x="40" y="118" fill="#6b7a9a" font-family="system-ui,sans-serif" font-size="11">Calque tensions (p&#233;dagogique, 0-3) :</text>
  <rect x="40" y="128" width="70" height="20" fill="#f9a825" opacity="0.45" rx="3"/>
  <text x="75" y="142" fill="#e4eaf4" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">1</text>
  <rect x="120" y="128" width="70" height="20" fill="#e65100" opacity="0.45" rx="3"/>
  <text x="155" y="142" fill="#e4eaf4" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">2</text>
  <rect x="200" y="128" width="70" height="20" fill="#c62828" opacity="0.52" rx="3"/>
  <text x="235" y="142" fill="#e4eaf4" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">3</text>
  <text x="290" y="144" fill="#6b7a9a" font-family="system-ui,sans-serif" font-size="10">pas un jugement ONU</text>
  <text x="40" y="188" fill="#6b7a9a" font-family="system-ui,sans-serif" font-size="10">Teintes = part musulmane + poids sunnite/chiite (mod&#232;le de donn&#233;es)</text>
</svg>
